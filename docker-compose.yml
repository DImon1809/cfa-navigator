services:
  cfa-navigator:
    image: registry.gitlab.com/gippy/cfa-test:latest
    container_name: cfa-navigator
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CFA_DATA_DIR: /app/data
    volumes:
      - cfa-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cfa-network

networks:
  cfa-network:
    driver: bridge

volumes:
  cfa-data:
    driver: local
